<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NearDrop — Client</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      padding: 40px 32px 32px;
    }
    .drag-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      -webkit-app-region: drag;
      z-index: 1;
    }
    .settings-gear {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .settings-gear:hover { color: #aaa; background: #2a2a2a; }
    .logo { margin-bottom: 8px; opacity: 0.9; }
    .logo svg { width: 40px; height: 40px; stroke: #7eb8ff; }
    h1 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 32px; }
    .connect-form {
      -webkit-app-region: no-drag;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .url-input-group {
      display: flex;
      align-items: center;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .url-input-group:focus-within { border-color: #4a9eff; }
    .url-prefix {
      padding-left: 14px;
      color: #666;
      padding-right: 4px;
      font-size: 14px;
      line-height: 1;
      user-select: none;
      white-space: nowrap;
    }
    .url-input {
      flex: 1;
      padding: 12px 14px 12px 0;
      background: #2a2a2a;
      border: none;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }
    .url-input::placeholder { color: #666; }
    .connect-btn {
      padding: 11px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .connect-btn:hover { background: #3a8eef; }
    .connect-btn:disabled { opacity: 0.4; pointer-events: none; }
    .connect-btn.connecting { opacity: 0.7; pointer-events: none; }
    .error-msg {
      font-size: 12px;
      color: #ff6b6b;
      text-align: center;
      min-height: 16px;
    }
    .hint {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-top: 4px;
      line-height: 1.5;
    }
    .version {
      position: fixed;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: #444;
    }
    /* Settings dropdown */
    .settings-menu {
      position: fixed;
      top: 40px;
      right: 12px;
      -webkit-app-region: no-drag;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 4px;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 20;
      display: none;
    }
    .settings-menu.open { display: block; }
    .settings-menu-item {
      padding: 8px 12px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .settings-menu-item:hover { background: #353535; }
    .settings-menu-divider {
      height: 1px;
      background: #3a3a3a;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <!-- Drag bar for window dragging -->
  <div class="drag-bar"></div>
  <!-- Settings gear -->
  <button class="settings-gear" id="settings-gear" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>
  <div class="settings-menu" id="settings-menu">
    <div class="settings-menu-item" id="switch-to-host">Switch to Host Mode</div>
    <div class="settings-menu-divider"></div>
    <div class="settings-menu-item" id="about-item">About NearDrop</div>
  </div>

  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
    </svg>
  </div>
  <h1>NearDrop</h1>
  <p class="subtitle">Connect to a NearDrop host</p>

  <div class="connect-form">
    <div class="url-input-group">
      <span class="url-prefix">http://</span>
      <input type="text" class="url-input" id="url-input" placeholder="192.168.1.5:51337" autocomplete="off" spellcheck="false">
    </div>
    <button class="connect-btn" id="connect-btn">Connect</button>
    <div class="error-msg" id="error-msg"></div>
    <div class="hint">Enter the URL shown on the host device's Connect screen.</div>
  </div>

  <span class="version" id="version"></span>

  <script>
    const urlInput = document.getElementById('url-input');
    const connectBtn = document.getElementById('connect-btn');
    const errorMsg = document.getElementById('error-msg');
    const settingsGear = document.getElementById('settings-gear');
    const settingsMenu = document.getElementById('settings-menu');
    const switchToHost = document.getElementById('switch-to-host');
    const aboutItem = document.getElementById('about-item');
    const versionEl = document.getElementById('version');

    // Version display
    if (window.electronAPI) {
      versionEl.textContent = 'v' + window.electronAPI.getAppVersion();
    }

    // URL input
    urlInput.addEventListener('input', () => { errorMsg.textContent = ''; });
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connectBtn.click();
    });

    // Connect
    connectBtn.addEventListener('click', async () => {
      let rawUrl = urlInput.value.trim();
      if (!rawUrl) { errorMsg.textContent = 'Please enter an address'; return; }
      let url = 'http://' + rawUrl.replace(/^https?:\/\//i, '');

      connectBtn.disabled = true;
      connectBtn.textContent = 'Connecting...';
      connectBtn.classList.add('connecting');
      errorMsg.textContent = '';

      try {
        const result = await window.electronAPI.openRemoteDevice(url);
        if (result && result.error) {
          errorMsg.textContent = result.error;
        } else {
          errorMsg.textContent = '';
          urlInput.value = '';
          // Hide this window — remote window is now visible
          window.electronAPI.hideMainWindow();
        }
      } catch (e) {
        errorMsg.textContent = 'Connection failed';
      } finally {
        connectBtn.disabled = false;
        connectBtn.textContent = 'Connect';
        connectBtn.classList.remove('connecting');
      }
    });

    // Settings menu
    settingsGear.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsMenu.classList.toggle('open');
    });
    document.addEventListener('click', () => settingsMenu.classList.remove('open'));

    switchToHost.addEventListener('click', () => {
      if (window.electronAPI && window.electronAPI.switchMode) {
        window.electronAPI.switchMode('host');
      }
    });

    aboutItem.addEventListener('click', () => {
      if (window.electronAPI && window.electronAPI.showAbout) {
        window.electronAPI.showAbout();
      }
    });

    // Focus URL input on load
    setTimeout(() => urlInput.focus(), 100);
  </script>
</body>
</html>
